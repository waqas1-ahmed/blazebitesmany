<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Blaze Bites - Admin Panel</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }
    body {
      background: linear-gradient(135deg, #1a1a2e, #16213e);
      min-height: 100vh;
      color: white;
      padding: 20px;
    }
    .login-box {
      max-width: 400px;
      margin: 100px auto;
      background: rgba(255,255,255,0.1);
      padding: 40px;
      border-radius: 20px;
      text-align: center;
    }
    .login-box input {
      width: 100%;
      padding: 12px;
      margin: 10px 0;
      background: rgba(255,255,255,0.1);
      border: 1px solid #ff8c42;
      border-radius: 8px;
      color: white;
    }
    .login-box button, .btn {
      background: #ff8c42;
      padding: 12px 24px;
      border: none;
      border-radius: 8px;
      color: white;
      font-weight: bold;
      cursor: pointer;
    }
    .dashboard {
      display: none;
    }
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 30px;
      padding: 20px;
      background: rgba(255,255,255,0.05);
      border-radius: 15px;
    }
    .card {
      background: rgba(255,255,255,0.05);
      padding: 20px;
      border-radius: 15px;
      margin-bottom: 20px;
    }
    .card input, .card select {
      width: 100%;
      padding: 10px;
      margin: 10px 0;
      background: rgba(0,0,0,0.3);
      border: 1px solid #ff8c42;
      border-radius: 8px;
      color: white;
    }
    .items-grid, .orders-list {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 15px;
      margin-top: 20px;
    }
    .item-card, .order-card {
      background: rgba(0,0,0,0.3);
      padding: 15px;
      border-radius: 12px;
      border-left: 3px solid #ff8c42;
    }
    .item-actions {
      display: flex;
      gap: 10px;
      margin-top: 10px;
    }
    .edit-btn { background: #4CAF50; padding: 5px 10px; border: none; border-radius: 5px; cursor: pointer; color: white; }
    .delete-btn { background: #f44336; padding: 5px 10px; border: none; border-radius: 5px; cursor: pointer; color: white; }
    .grid-2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
    }
    @media (max-width: 768px) {
      .grid-2 { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<div id="loginPage">
  <div class="login-box">
    <h2>🔥 Blaze Admin</h2>
    <input type="text" id="username" placeholder="Username">
    <input type="password" id="password" placeholder="Password">
    <button onclick="login()">Login</button>
    <p id="errorMsg" style="color:red; margin-top:10px;"></p>
  </div>
</div>

<div id="dashboard" class="dashboard">
  <div class="header">
    <h2>🔥 Blaze Bites Admin Panel</h2>
    <button class="btn" onclick="logout()">Logout</button>
  </div>

  <div class="grid-2">
    <div class="card">
      <h3>➕ Add Product</h3>
      <input type="text" id="itemName" placeholder="Product Name">
      <input type="number" id="itemPrice" placeholder="Price">
      <select id="itemCategory">
        <option value="burger">Burger</option>
        <option value="fries">Fries</option>
        <option value="wrap">Wrap</option>
      </select>
      <button class="btn" onclick="addItem()">Add Item</button>
    </div>

    <div class="card">
      <h3>🏷️ Apply Discount</h3>
      <input type="text" id="discountId" placeholder="Item ID">
      <input type="number" id="discountPercent" placeholder="Discount %">
      <button class="btn" onclick="applyDiscount()">Apply</button>
      <p style="font-size:12px; margin-top:10px;">💡 ID product card par dikhega</p>
    </div>
  </div>

  <div class="card">
    <h3>📦 Products</h3>
    <div id="itemsList" class="items-grid">Loading...</div>
  </div>

  <div class="card">
    <h3>🛒 Orders</h3>
    <div id="ordersList" class="orders-list">Loading...</div>
  </div>
</div>

<script>
  const API = 'http://localhost:3000/api';

  if (localStorage.getItem('adminLoggedIn') === 'true') {
    document.getElementById('loginPage').style.display = 'none';
    document.getElementById('dashboard').style.display = 'block';
    loadItems();
    loadOrders();
  }

  async function login() {
    const username = document.getElementById('username').value;
    const password = document.getElementById('password').value;
    
    if (username === 'admin' && password === 'admin123') {
      localStorage.setItem('adminLoggedIn', 'true');
      document.getElementById('loginPage').style.display = 'none';
      document.getElementById('dashboard').style.display = 'block';
      loadItems();
      loadOrders();
    } else {
      document.getElementById('errorMsg').innerText = 'Invalid! Use admin / admin123';
    }
  }

  function logout() {
    localStorage.removeItem('adminLoggedIn');
    location.reload();
  }

  async function loadItems() {
    try {
      const res = await fetch(`${API}/items`);
      const items = await res.json();
      const container = document.getElementById('itemsList');
      if (items.length === 0) {
        container.innerHTML = '<p>No products</p>';
        return;
      }
      container.innerHTML = '';
      items.forEach(item => {
        container.innerHTML += `
          <div class="item-card">
            <strong>${item.name}</strong>
            <div>Rs. ${item.price}</div>
            <div style="font-size:11px">ID: ${item._id}</div>
            <div class="item-actions">
              <button class="edit-btn" onclick="editItem('${item._id}', '${item.name}', ${item.price})">Edit</button>
              <button class="delete-btn" onclick="deleteItem('${item._id}')">Delete</button>
            </div>
          </div>
        `;
      });
    } catch (err) {
      document.getElementById('itemsList').innerHTML = '<p>❌ Backend not running on port 3000</p>';
    }
  }

  async function addItem() {
    const name = document.getElementById('itemName').value;
    const price = parseFloat(document.getElementById('itemPrice').value);
    const category = document.getElementById('itemCategory').value;
    if (!name || !price) { alert('Fill all fields'); return; }
    try {
      await fetch(`${API}/items`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ name, price, category, discount: 0 })
      });
      alert('Added!');
      document.getElementById('itemName').value = '';
      document.getElementById('itemPrice').value = '';
      loadItems();
    } catch (err) { alert('Error'); }
  }

  async function applyDiscount() {
    const id = document.getElementById('discountId').value;
    const discount = parseInt(document.getElementById('discountPercent').value);
    if (!id || !discount) { alert('Enter ID and discount'); return; }
    try {
      const res = await fetch(`${API}/items/${id}`, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ discount })
      });
      if (res.ok) {
        alert('Discount applied!');
        loadItems();
      } else { alert('ID not found'); }
    } catch (err) { alert('Error'); }
  }

  async function deleteItem(id) {
    if (confirm('Delete?')) {
      await fetch(`${API}/items/${id}`, { method: 'DELETE' });
      loadItems();
    }
  }

  function editItem(id, oldName, oldPrice) {
    const newName = prompt('New name:', oldName);
    const newPrice = prompt('New price:', oldPrice);
    if (newName && newPrice) {
      updateItem(id, newName, parseFloat(newPrice));
    }
  }

  async function updateItem(id, name, price) {
    await fetch(`${API}/items/${id}`, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ name, price })
    });
    loadItems();
  }

  async function loadOrders() {
    try {
      const res = await fetch(`${API}/orders`);
      const orders = await res.json();
      const container = document.getElementById('ordersList');
      if (orders.length === 0) {
        container.innerHTML = '<p>No orders yet</p>';
        return;
      }
      container.innerHTML = '';
      orders.forEach(order => {
        container.innerHTML += `
          <div class="order-card">
            <strong>${order.name}</strong><br>
            📞 ${order.phone}<br>
            📍 ${order.address}<br>
            🍔 ${order.item} × ${order.qty}<br>
            <span style="background:#ff9800; padding:2px 8px; border-radius:20px; font-size:12px;">${order.status || 'pending'}</span>
          </div>
        `;
      });
    } catch (err) {
      document.getElementById('ordersList').innerHTML = '<p>Loading...</p>';
    }
  }

  setInterval(() => {
    if (document.getElementById('dashboard').style.display === 'block') {
      loadOrders();
      loadItems();
    }
  }, 5000);
</script>
</body>
</html>
