<!DOCTYPE html>
<html>
<head>

    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            padding: 50px;
            background: #1a1a2e;
            color: white;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }
        h1 { 
            color: #ff8c42; 
            font-size: 48px;
            margin-bottom: 10px;
        }
        .subtitle {
            color: #aaa;
            font-size: 18px;
            margin-bottom: 30px;
        }
        .links { 
            margin-top: 20px; 
        }
        .links a {
            display: inline-block;
            margin: 10px 15px;
            padding: 14px 30px;
            background: #ff8c42;
            color: white;
            text-decoration: none;
            border-radius: 8px;

            font-weight: bold;

        }
        .links a:hover { 
            background: #e63900; 
            transform: scale(1.05);
        }
        .footer {
